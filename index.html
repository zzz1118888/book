                        <div class="mb-3 cursor-pointer group" onclick="openModal('${book.id}')" title="點擊查看完整簡介">
                            <span class="text-xs font-bold bg-gray-200 text-gray-700 px-2 py-1 rounded">內容簡介</span>
                            <p class="text-sm mt-2 text-gray-600 line-clamp-2 whitespace-pre-line group-hover:text-blue-600 transition">${book.description}</p>
                            <span class="text-blue-600 text-xs mt-1 inline-block hover:underline">閱讀完整簡介 ↗</span>
                        </div>

                        <div class="mb-4 flex-grow">
                            <span class="text-xs font-bold bg-gray-200 text-gray-700 px-2 py-1 rounded">核心收穫</span>
                            <ul class="text-sm mt-2 text-gray-700 list-none space-y-2">
                                ${takeawaysHtml}
                            </ul>
                        </div>

                        <button onclick="openModal('${book.id}')" class="w-full mt-auto bg-gray-900 text-white py-2 rounded-lg hover:bg-gray-700 transition">
                            查看完整簡介與書評
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 播放語音功能
        window.toggleAudio = function(bookId) {
            const book = books.find(b => b.id === bookId);
            const synth = window.speechSynthesis;
            const btnText = document.getElementById('audio-btn-text');

            // 如果正在播放，則停止
            if (isAudioPlaying) {
                synth.cancel();
                isAudioPlaying = false;
                if(btnText) btnText.innerText = '🔊 聽取導讀與精華';
                return;
            }

            // 確保清除先前的佇列
            synth.cancel();

            // 組合要朗讀的文字內容
            let textToRead = `書名：${book.title}。`;
            textToRead += `內容簡介：${book.description}。`;
            textToRead += `核心收穫：`;
            book.takeaways.forEach(t => {
                textToRead += `${t.replace(/^\d+\.\s*/, '')}。`;
            });
            if (book.deepReview) {
                textToRead += `深度書評：${book.deepReview}。`;
            }
            if (book.quotes && book.quotes.length > 0) {
                textToRead += `書中金句：`;
                book.quotes.forEach(q => {
                    textToRead += `${q}。`;
                });
            }

            const utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = 'zh-HK'; // 粵語發音
            utterance.rate = 1.0; 

            // 播放結束時恢復按鈕狀態
            utterance.onend = function() {
                isAudioPlaying = false;
                if(btnText) btnText.innerText = '🔊 聽取導讀與精華';
            };

            // 發生錯誤時恢復按鈕狀態
            utterance.onerror = function() {
                isAudioPlaying = false;
                if(btnText) btnText.innerText = '🔊 聽取導讀與精華';
            };

            synth.speak(utterance);
            isAudioPlaying = true;
            if(btnText) btnText.innerText = '⏹️ 停止語音導讀';
        }

        // 打開評論彈窗
        window.openModal = function(bookId) {
            currentBookId = bookId;
            const book = books.find(b => b.id === bookId);
            document.getElementById('modal-title').innerText = `《${book.title}》`;
            
            // 處理完整金句
            let fullQuotesHtml = '';
            if (book.quotes && book.quotes.length > 0) {
                const quotesList = book.quotes.map(q => `<p class="mb-3 italic text-gray-800 leading-relaxed font-serif text-[15px]">${q}</p>`).join('');
                fullQuotesHtml = `
                    <div class="mt-5 bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-lg shadow-sm">
                        <h4 class="font-bold text-amber-800 mb-3 flex items-center"><span class="mr-2">💡</span> 書中精華摘錄</h4>
                        ${quotesList}
                    </div>
                `;
            }

            // 處理深度書評
            let deepReviewHtml = '';
            if (book.deepReview) {
                deepReviewHtml = `
                    <div class="mt-5 bg-blue-50/50 border border-blue-100 p-4 rounded-lg">
                        <h4 class="font-bold text-blue-900 mb-2 flex items-center"><span class="mr-2">✍️</span> 深度書評</h4>
                        <p class="text-sm text-gray-700 leading-relaxed text-justify">${book.deepReview}</p>
                    </div>
                `;
            }

            const detailsDiv = document.getElementById('modal-book-details');
            detailsDiv.innerHTML = `
                <div class="flex flex-col md:flex-row gap-5 relative">
                    <img src="${book.cover}" alt="${book.title}" class="w-24 h-36 object-cover rounded shadow-md hidden md:block">
                    <div class="flex-grow">
                        <h4 class="font-bold text-gray-700 mb-2 flex items-center"><span class="mr-2">📖</span> 完整內容簡介</h4>
                        <p class="text-sm text-gray-700 whitespace-pre-line mb-4 leading-relaxed">${book.description}</p>
                        
                        <h4 class="font-bold text-gray-700 mb-2 flex items-center"><span class="mr-2">👤</span> 適合誰看</h4>
                        <p class="text-sm text-gray-700 mb-4">${book.target}</p>

                        <!-- 新增語音導讀按鈕 -->
                        <button id="audio-btn" onclick="toggleAudio('${book.id}')" class="flex items-center justify-center bg-blue-100 text-blue-700 px-4 py-2 rounded-lg font-bold hover:bg-blue-200 transition shadow-sm w-full md:w-auto">
                            <span id="audio-btn-text">🔊 聽取導讀與精華</span>
                        </button>
                    </div>
                </div>
                ${deepReviewHtml}
                ${fullQuotesHtml}
            `;
            
            renderComments();
            document.getElementById('comment-modal').classList.remove('hidden');
        }

        // 關閉評論彈窗
        window.closeModal = function() {
            // 關閉彈窗時強制停止語音
            window.speechSynthesis.cancel();
            isAudioPlaying = false;

            document.getElementById('comment-modal').classList.add('hidden');
            document.getElementById('new-comment-text').value = ''; 
            currentBookId = null;
        }

        // 展開/收起簡介功能
        window.toggleDesc = function(bookId) {
            const descP = document.getElementById(`desc-${bookId}`);
            const btn = document.getElementById(`btn-desc-${bookId}`);
            if (descP.classList.contains('line-clamp-3')) {
                descP.classList.remove('line-clamp-3');
                btn.innerText = '收起 ▲';
            } else {
                descP.classList.add('line-clamp-3');
                btn.innerText = '展開全部 ▼';
            }
        }

        // 渲染彈窗內的評論列表
        function renderComments() {
            const listDiv = document.getElementById('modal-comments-list');
            const comments = commentsDB[currentBookId] || [];
            
            if (comments.length === 0) {
                listDiv.innerHTML = '<p class="text-gray-500 text-center py-8">目前還沒有評論，來搶頭香吧！</p>';
                return;
            }

            let html = '';
            [...comments].reverse().forEach(c => {
                html += `
                    <div class="border-b border-gray-100 pb-4 mb-4 last:border-0 last:mb-0 last:pb-0">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-sm text-gray-800">👤 ${c.user}</span>
                            <span class="text-xs text-gray-400">${c.time}</span>
                        </div>
                        <div class="text-yellow-500 text-xs mb-2">${renderStars(c.rating)}</div>
                        <p class="text-gray-700 text-sm whitespace-pre-wrap">${c.text}</p>
                    </div>
                `;
            });
            
            listDiv.innerHTML = html;
        }

        // 提交新評論
        window.submitComment = function() {
            const textInput = document.getElementById('new-comment-text');
            const ratingInput = document.getElementById('new-comment-rating');
            const text = textInput.value.trim();
            
            if (!text) {
                alert('請先輸入評論內容喔！');
                return;
            }

            if (!commentsDB[currentBookId]) {
                commentsDB[currentBookId] = [];
            }

            commentsDB[currentBookId].push({
                user: "網站客人 (你)",
                rating: parseInt(ratingInput.value),
                text: text,
                time: "剛剛"
            });
            
            saveComments(); 

            textInput.value = '';
            renderComments();

            const countSpan = document.getElementById(`review-count-${currentBookId}`);
            let totalReviews = commentsDB[currentBookId].length;
            countSpan.innerText = `(${totalReviews} 則評論)`;
            countSpan.classList.add('text-green-600', 'font-bold');
            
            let newAvg = getAverageRating(currentBookId);
            const starSpan = document.getElementById(`star-rating-${currentBookId}`);
            const numSpan = document.getElementById(`num-rating-${currentBookId}`);
            
            starSpan.innerText = renderStars(newAvg);
            numSpan.innerText = newAvg;
            numSpan.classList.add('text-green-600');

            setTimeout(() => {
                countSpan.classList.remove('text-green-600', 'font-bold');
                numSpan.classList.remove('text-green-600');
            }, 2000);
        }

        // 初始渲染
        renderBooks();

    </script>
</body>
</html>
